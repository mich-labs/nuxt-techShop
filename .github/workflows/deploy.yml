name: Deploy nuxt

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, rpi]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: set ENV
        run: |
          cat > .env << EOF
          NUXT_CMS_URL=${{ secrets.CMS_URL }}
          NUXT_PUBLIC_CMS_URL=${{ secrets.PUBLIC_CMS_URL }}
          NUXT_STRAPI_PUBLIC_ACCESS_TOKEN=${{ secrets.PUBLIC_CMS_ACCESS_TOKEN }}
          NODE_ENV=production
          EOF

      - name: Rebuild container
        run: |
          docker compose up nuxtie -d --build
